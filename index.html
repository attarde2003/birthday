<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Leenu🎂</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  background: linear-gradient(135deg,#ff758c,#ff7eb3);
  color:white;
  text-align:center;
  overflow-x:hidden;
}

/* Sections */
.section{
  display:none;
  min-height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  padding:20px;
  opacity:0;
  transform:translateY(40px);
  transition:0.6s;
}

/* FIXED IMAGE RESPONSIVE */
.section img{
  max-width:100%;
  height:auto;
}

.active{display:flex;opacity:1;transform:translateY(0);}

/* Button */
.btn{
  padding:12px 28px;
  margin-top:20px;
  border:none;
  background:white;
  color:#ff4d6d;
  border-radius:30px;
  cursor:pointer;
  font-weight:bold;
}
.btn:hover{transform:scale(1.1);}

/* Cartoon */
.cartoon{
  width:260px;
  animation:float 3s infinite;
}
@keyframes float{50%{transform:translateY(-20px);}}

/* Cake */
.cake-container{
  position:relative;
  width:250px;
  margin-top:20px;
}
.cake-img{
  width:100%;
  border-radius:15px;
}
.knife{
  position:absolute;
  top:0;
  left:-30px;
  width:4px;
  height:100%;
  background:white;
  transition:0.5s;
}
.cut .knife{left:120px;}

/* Gallery */
.gallery{
  display:flex;
  flex-wrap:wrap;
  gap:20px;
  justify-content:center;
  margin-top:20px;
}

.gallery img{
  width:30%;
  max-width:400px;
  height:250px;
  border-radius:20px;
  object-fit:cover;
  opacity:0;
  transform:scale(0.5);
  transition:0.5s;
}

.gallery img.show{
  opacity:1;
  transform:scale(1);
}

/* Cards */
.cards{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
  justify-content:center;
}
.card{
  width:180px;height:180px;
  perspective:1000px;
  position:relative;
  cursor:pointer;
}
.card div{
  position:absolute;
  width:100%;height:100%;
  border-radius:15px;
  display:flex;
  justify-content:center;
  align-items:center;
  backface-visibility:hidden;
  transition:0.6s;
}
.front{background:white;color:#ff4d6d;}
.back{background:#fa5876;transform:rotateY(180deg);}
.card.flip .front{transform:rotateY(180deg);}
.card.flip .back{transform:rotateY(360deg);}

/* Popup */
.popup{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
}
.popup-content{
  background:white;
  color:#ff4d6d;
  padding:30px;
  border-radius:20px;
  width:90%;
  max-width:400px;
}

/* Responsive */
@media(max-width:900px){
  .gallery img{
    width:45%;
    height:220px;
  }
}

@media(max-width:600px){
  .gallery img{
    width:100%;
    height:200px;
  }
}
</style>
</head>

<body>

<audio id="music" src="https://www.bensound.com/bensound-music/bensound-romantic.mp3"></audio>

<!-- Start -->
<div class="section active" id="start">
  <h1>🎂 Happy Birthday My Fav Girl ❤️</h1>
  <button class="btn" onclick="start()">Start</button>
</div>

<!-- Cartoon -->
<div class="section" id="cartoon">
  <h2>You are special My Sweetu 😘</h2>
  <br>
  <img src="https://media4.giphy.com/media/qFmdpUKAFZ6rMobzzu/giphy.webp" class="cartoon">
  <button class="btn" onclick="nextSection('cake')">Next</button>
</div>

<!-- Cake -->
<div class="section" id="cake">
  <h2>Sweet Cake for My Leenu 🎂</h2>

  <div class="cake-container" id="cakeBox">
    <img src="https://media3.giphy.com/media/wumLmqIVT4yDwsZiqD/giphy.webp" class="cake-img">
  </div>

  <p id="cakeText"></p>
  <button class="btn" onclick="nextSection('gallery')">Next</button>
</div>

<!-- Gallery -->
<div class="section" id="gallery">
  <h2>Sweet Memories with My Cat 🤭</h2>
  <button class="btn" onclick="showPhotos()">Show Photos</button>

  <div class="gallery">
    <img src="image1.jpeg">
    <img src="image2.jpeg">
    <img src="image3.jpeg">
    <img src="image4.jpeg">
    <img src="image5.jpeg">
  </div>

  <button class="btn" onclick="nextSection('love')">Next</button>
</div>

<!-- Love -->
<div class="section" id="love">
  <h2>💖 Reasons Why You’re Special</h2>

  <div class="cards">
    <div class="card" onclick="this.classList.toggle('flip')">
      <div class="front">Click 💕</div>
      <div class="back">Your smile makes me Happy 😊</div>
    </div>

    <div class="card" onclick="this.classList.toggle('flip')">
      <div class="front">Click 💕</div>
      <div class="back">I Like Your Simplicity ✨</div>
    </div>

    <div class="card" onclick="this.classList.toggle('flip')">
      <div class="front">Click 💕</div>
      <div class="back">You are only Mine My Dear leenuu 💖</div>
    </div>
  </div>

  <button class="btn" onclick="showPopup()">Final Surprise 🎁</button>
</div>

<!-- Popup -->
<div class="popup" id="popup">
  <div class="popup-content">
    <h2>🎁 Surprise 🎁</h2>
    <p id="message"></p>
    <button class="btn" onclick="closePopup()">Close</button>
  </div>
</div>

<script>

function start(){
  document.getElementById("music").play();
  nextSection('cartoon');
}

function nextSection(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* Cake swipe */
let startX=0;
const cakeBox=document.getElementById("cakeBox");

cakeBox.addEventListener("mousedown",e=>startX=e.clientX);
cakeBox.addEventListener("mouseup",e=>{
  if(Math.abs(e.clientX-startX)>50){
    cakeBox.classList.add("cut");
    document.getElementById("cakeText").innerText="🎉 Cake Cut!";
  }
});

/* Gallery */
function showPhotos(){
  document.querySelectorAll(".gallery img").forEach((img,i)=>{
    setTimeout(()=>img.classList.add("show"),i*300);
  });
}

/* Popup */
function showPopup(){
  document.getElementById("popup").style.display="flex";
  document.getElementById("message").innerText=
    "Happy Birthday My Dear Leenuu, My Sweet Mau🎂";
}

function closePopup(){
  document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>
